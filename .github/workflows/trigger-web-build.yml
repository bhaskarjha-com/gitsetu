name: Trigger Cloudflare Pages Web Build

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**' # Only trigger when documentation changes

jobs:
  trigger-build:
    runs-on: ubuntu-latest
    steps:
      - name: Send Cloudflare Deploy Hook
        # This sends a secure POST request to the URL stored in GitHub Secrets
        run: |
          curl -X POST "${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL }}"
          echo "Cloudflare Web Build triggered successfully!"
